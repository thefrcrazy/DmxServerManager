name: dmx-server-manager

services:
  panel:
    image: "${DMX_IMAGE:?set DMX_IMAGE to ghcr.io/thefrcrazy/dmx-server-manager@sha256:<signed-digest>}"
    platform: linux/amd64
    restart: unless-stopped
    network_mode: host
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 2m
    pids_limit: 4096
    environment:
      TZ: ${DMX_TIMEZONE:-Etc/UTC}
      DMX_BIND: 127.0.0.1:5500
      DMX_CONFIG_FILE: /data/config.toml
      DMX_DATA_DIR: /data
      DMX_DATABASE_URL: sqlite:///data/dmx-server-manager.sqlite?mode=rwc
      DMX_IMPORT_ROOTS: /imports
      DMX_LOG: ${DMX_LOG:-info}
      DMX_MASTER_KEY_FILE: /run/secrets/dmx_master_key
      DMX_STEAMCMD_PATH: /usr/games/steamcmd
      DMX_STATIC_DIR: /opt/dmx-server-manager/static
      DMX_REVERSE_PROXY: "true"
      DMX_SESSION_TTL_HOURS: ${DMX_SESSION_TTL_HOURS:-24}
      DMX_SETUP_TOKEN: ${DMX_SETUP_TOKEN:-}
      DMX_TRUSTED_PROXIES: 127.0.0.1,::1
      DMX_DEPLOYMENT_MODE: docker
      # Empty means: use the official URL and public key compiled into the image.
      # Override both variables together; a partial override is rejected.
      DMX_RELEASE_MANIFEST_URL: ${DMX_RELEASE_MANIFEST_URL:-}
      DMX_RELEASE_PUBLIC_KEY: ${DMX_RELEASE_PUBLIC_KEY:-}
      DMX_RELEASE_CHECK_INTERVAL_SECONDS: ${DMX_RELEASE_CHECK_INTERVAL_SECONDS:-21600}
    volumes:
      - dmx_data:/data
      - type: bind
        source: ${DMX_IMPORTS_PATH:-./imports}
        target: /imports
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./secrets/master.key
        target: /run/secrets/dmx_master_key
        read_only: true
        bind:
          create_host_path: false
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /run:size=16m,mode=0755
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:5500/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  traefik:
    image: traefik:v3.7.7@sha256:1cb3845d7a05e1473c9086351426597e911db49db382b6e4769f9b0744962ac8
    platform: linux/amd64
    restart: unless-stopped
    network_mode: host
    read_only: true
    stop_grace_period: 30s
    pids_limit: 512
    command:
      - --api.dashboard=false
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      - --log.level=INFO
      - --accesslog=true
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${DMX_ACME_EMAIL:?set DMX_ACME_EMAIL in install/linux/.env}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_letsencrypt:/letsencrypt
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777

volumes:
  dmx_data:
    name: dmx-server-manager-data
  traefik_letsencrypt:
    name: dmx-server-manager-letsencrypt
